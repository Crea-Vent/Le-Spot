<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Spot Angers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange-brule:  #A33B26;
      --orange-corail: #FF6B45;
      --jaune-solaire: #FFC845;
      --blanc-casse:   #F9F7F2;
      --dark-tint:     #7a2b1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: var(--blanc-casse);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      background-color: var(--orange-brule);
      padding: 18px 20px 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .app-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--blanc-casse);
      letter-spacing: 0.04em;
    }

    .app-title span { color: var(--jaune-solaire); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Avatar / bouton compte */
    .btn-account {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background-color: var(--dark-tint);
      border: 2px solid var(--jaune-solaire);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s;
      font-size: 1.1rem;
      color: var(--blanc-casse);
      flex-shrink: 0;
    }

    .btn-account:hover { transform: scale(1.08); }

    .btn-account.logged-in {
      background-color: var(--jaune-solaire);
      color: var(--orange-brule);
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
    }

    /* ── DATE LIST ── */
    .date-list {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding-bottom: 16px;
    }

    .date-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 66px;
      border-radius: 14px;
      background-color: var(--dark-tint);
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      user-select: none;
      flex-shrink: 0;
    }

    .date-card:hover { transform: scale(1.05); }

    .date-card .day {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: #e8c5bc;
    }

    .date-card .month {
      font-size: 0.68rem;
      font-weight: 500;
      color: #e8c5bc;
      margin-top: 2px;
    }

    .date-card.today {
      background-color: var(--orange-corail);
      box-shadow: 0 0 0 2px var(--jaune-solaire);
    }

    .date-card.today .day,
    .date-card.today .month { color: #fff; }

    .date-card.active {
      background-color: var(--blanc-casse);
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      transform: scale(1.12);
    }

    .date-card.active .day,
    .date-card.active .month {
      color: var(--orange-brule);
      font-weight: 800;
    }

    .date-card.faded { opacity: 0.45; }

    /* ── CATEGORIES ── */
    .categories {
      width: 100%;
      background-color: #fff;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      box-shadow: 0 2px 10px rgba(163,59,38,0.1);
    }

    .categories::-webkit-scrollbar { display: none; }

    .cat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 20px;
      background-color: #f5e8e5;
      color: var(--orange-brule);
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      border: 2px solid transparent;
      transition: all 0.18s;
    }

    .cat-chip:hover { background-color: #f0d8d3; }

    .cat-chip.selected {
      background-color: var(--orange-brule);
      color: var(--blanc-casse);
      border-color: var(--orange-brule);
    }

    .cat-chip .icon { font-size: 1rem; }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .main h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--orange-brule);
      letter-spacing: 0.04em;
      text-align: center;
    }

    .main h1 span { color: var(--orange-corail); }

    .main p {
      font-size: 0.95rem;
      color: #999;
      font-weight: 500;
    }

    /* ══════════════════════════════
       OVERLAY + DRAWER COMPTE
    ══════════════════════════════ */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    .overlay.open { display: block; }

    .drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--blanc-casse);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      z-index: 101;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(.32,1.2,.6,1);
      max-width: 480px;
      margin: 0 auto;
    }

    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 40px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    /* Tabs Connexion / Inscription */
    .auth-tabs {
      display: flex;
      background: #ede0dc;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 9px;
      border-radius: 9px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--orange-brule);
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--orange-brule);
      color: var(--blanc-casse);
    }

    /* Formulaires */
    .auth-form { display: none; flex-direction: column; gap: 14px; }
    .auth-form.active { display: flex; }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-group label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--dark-tint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-group input {
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid #e5d5d0;
      background: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: #222;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-group input:focus { border-color: var(--orange-corail); }

    .btn-submit {
      margin-top: 4px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: var(--orange-brule);
      color: var(--blanc-casse);
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-submit:hover {
      background: var(--orange-corail);
      transform: translateY(-1px);
    }

    .btn-submit:active { transform: translateY(0); }

    /* Message d'erreur */
    .auth-error {
      display: none;
      background: #fce8e4;
      color: var(--orange-brule);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.83rem;
      font-weight: 500;
    }

    .auth-error.show { display: block; }

    /* Profil connecté dans le drawer */
    .profile-view { display: none; flex-direction: column; gap: 20px; }
    .profile-view.active { display: flex; }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--jaune-solaire);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--orange-brule);
      margin: 0 auto;
    }

    .profile-name {
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--orange-brule);
    }

    .profile-email {
      text-align: center;
      font-size: 0.85rem;
      color: #999;
      margin-top: -14px;
    }

    .btn-logout {
      padding: 12px;
      border-radius: 14px;
      border: 2px solid var(--orange-brule);
      background: transparent;
      color: var(--orange-brule);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: var(--orange-brule);
      color: var(--blanc-casse);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">Le <span>Spot</span> Angers</div>
      <div class="header-right">
        <button class="btn-account" id="btnAccount" title="Mon compte">👤</button>
      </div>
    </div>
    <div class="date-list" id="dateList"></div>
  </div>

  <!-- CATEGORIES -->
  <div class="categories">
    <div class="cat-chip selected" data-cat="bar"><span class="icon">🍺</span> Bar</div>
    <div class="cat-chip" data-cat="bde"><span class="icon">🎓</span> BDE</div>
    <div class="cat-chip" data-cat="culture"><span class="icon">🎨</span> Culture</div>
    <div class="cat-chip" data-cat="evenements"><span class="icon">🎉</span> Évènements</div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1>Le <span>Spot</span><br>Angers</h1>
    <p>La nouvelle app angevine 🌇</p>
  </div>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- DRAWER COMPTE -->
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>

    <!-- Formulaires auth (non connecté) -->
    <div id="authPanel">
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Connexion</div>
        <div class="auth-tab" data-tab="register">Inscription</div>
      </div>

      <div class="auth-error" id="authError"></div>

      <!-- Connexion -->
      <form class="auth-form active" id="formLogin">
        <div class="field-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="ton@email.fr" required />
        </div>
        <div class="field-group">
          <label>Mot de passe</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-submit">Se connecter</button>
      </form>

      <!-- Inscription -->
      <form class="auth-form" id="formRegister">
        <div class="field-group">
          <label>Prénom</label>
          <input type="text" id="regPrenom" placeholder="Léa" required />
        </div>
        <div class="field-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="ton@email.fr" required />
        </div>
        <div class="field-group">
          <label>Mot de passe</label>
          <input type="password" id="regPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-submit">Créer mon compte</button>
      </form>
    </div>

    <!-- Profil connecté -->
    <div class="profile-view" id="profilePanel">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-name" id="profileName"></div>
      <div class="profile-email" id="profileEmail"></div>
      <button class="btn-logout" id="btnLogout">Se déconnecter</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp }                              from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getAnalytics }                              from "https://www.gstatic.com/firebasejs/11.4.0/firebase-analytics.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

    /* ── Firebase init ── */
    const firebaseConfig = {
      apiKey:            "AIzaSyBRGJV8pMv4rcr93DUWVeCULJmojRHOrV4",
      authDomain:        "le-spot-angers.firebaseapp.com",
      projectId:         "le-spot-angers",
      storageBucket:     "le-spot-angers.firebasestorage.app",
      messagingSenderId: "567848754489",
      appId:             "1:567848754489:web:b5c4c8e6910009235d5ce8",
      measurementId:     "G-T0D0EK8WBP"
    };

    const app       = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth      = getAuth(app);

    /* ── Dates ── */
    const months   = ['jan','fév','mars','avr','mai','juin','juil','août','sep','oct','nov','déc'];
    const dateList = document.getElementById('dateList');
    const today    = new Date();

    for (let i = -3; i <= 3; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      const card = document.createElement('div');
      let cls = 'date-card';
      if (i === 0) cls += ' today active';
      if (i < -1) cls += ' faded';
      card.className = cls;
      card.innerHTML = `
        <span class="day">${String(d.getDate()).padStart(2,'0')}</span>
        <span class="month">${months[d.getMonth()]}</span>
      `;
      card.addEventListener('click', () => {
        document.querySelectorAll('.date-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });
      dateList.appendChild(card);
    }

    /* ── Catégories ── */
    document.querySelectorAll('.cat-chip').forEach(chip =>
      chip.addEventListener('click', () => chip.classList.toggle('selected'))
    );

    /* ── Drawer ── */
    const overlay    = document.getElementById('overlay');
    const drawer     = document.getElementById('drawer');
    const btnAccount = document.getElementById('btnAccount');

    const openDrawer  = () => { overlay.classList.add('open'); drawer.classList.add('open'); };
    const closeDrawer = () => { overlay.classList.remove('open'); drawer.classList.remove('open'); };

    btnAccount.addEventListener('click', openDrawer);
    overlay.addEventListener('click', closeDrawer);

    /* ── Tabs ── */
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('form' + capitalize(tab.dataset.tab)).classList.add('active');
        hideError();
      });
    });

    /* ── Connexion Firebase ── */
    document.getElementById('formLogin').addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn      = e.target.querySelector('.btn-submit');
      btn.textContent = 'Connexion…';
      btn.disabled    = true;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        closeDrawer();
      } catch (err) {
        showError(firebaseError(err.code));
      } finally {
        btn.textContent = 'Se connecter';
        btn.disabled    = false;
      }
    });

    /* ── Inscription Firebase ── */
    document.getElementById('formRegister').addEventListener('submit', async e => {
      e.preventDefault();
      const prenom   = document.getElementById('regPrenom').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const btn      = e.target.querySelector('.btn-submit');
      btn.textContent = 'Création…';
      btn.disabled    = true;
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: prenom });
        closeDrawer();
      } catch (err) {
        showError(firebaseError(err.code));
      } finally {
        btn.textContent = 'Créer mon compte';
        btn.disabled    = false;
      }
    });

    /* ── Déconnexion ── */
    document.getElementById('btnLogout').addEventListener('click', async () => {
      await signOut(auth);
      closeDrawer();
    });

    /* ── Etat de connexion (temps réel) ── */
    onAuthStateChanged(auth, user => {
      const authPanel    = document.getElementById('authPanel');
      const profilePanel = document.getElementById('profilePanel');

      if (user) {
        const name = user.displayName || user.email.split('@')[0];
        authPanel.style.display = 'none';
        profilePanel.classList.add('active');
        document.getElementById('profileAvatar').textContent = name[0].toUpperCase();
        document.getElementById('profileName').textContent   = name;
        document.getElementById('profileEmail').textContent  = user.email;
        btnAccount.textContent = name[0].toUpperCase();
        btnAccount.classList.add('logged-in');
      } else {
        authPanel.style.display = 'block';
        profilePanel.classList.remove('active');
        btnAccount.textContent = '👤';
        btnAccount.classList.remove('logged-in');
      }
    });

    /* ── Helpers ── */
    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('authError').classList.remove('show');
    }

    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    function firebaseError(code) {
      const map = {
        'auth/invalid-email':          'Adresse email invalide.',
        'auth/user-not-found':         'Aucun compte avec cet email.',
        'auth/wrong-password':         'Mot de passe incorrect.',
        'auth/invalid-credential':     'Email ou mot de passe incorrect.',
        'auth/email-already-in-use':   'Cet email est déjà utilisé.',
        'auth/weak-password':          'Mot de passe trop faible (6 caractères min.).',
        'auth/too-many-requests':      'Trop de tentatives. Réessaie plus tard.',
      };
      return map[code] || 'Une erreur est survenue. Réessaie.';
    }
  </script>

</body>
</html>
