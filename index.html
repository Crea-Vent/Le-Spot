<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Spot Angers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange-brule:  #A33B26;
      --orange-corail: #FF6B45;
      --jaune-solaire: #FFC845;
      --blanc-casse:   #F9F7F2;
      --dark-tint:     #7a2b1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: var(--blanc-casse);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      background-color: var(--orange-brule);
      padding: 18px 20px 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .app-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--blanc-casse);
      letter-spacing: 0.04em;
    }

    .app-title span {
      color: var(--jaune-solaire);
    }

    .header-badge {
      background-color: var(--orange-corail);
      color: var(--blanc-casse);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── DATE LIST ── */
    .date-list {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding-bottom: 16px;
    }

    .date-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 66px;
      border-radius: 14px;
      background-color: var(--dark-tint);
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      user-select: none;
      flex-shrink: 0;
    }

    .date-card:hover { transform: scale(1.05); }

    .date-card .day {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: #e8c5bc;
    }

    .date-card .month {
      font-size: 0.68rem;
      font-weight: 500;
      color: #e8c5bc;
      margin-top: 2px;
    }

    .date-card.today {
      background-color: var(--orange-corail);
      box-shadow: 0 0 0 2px var(--jaune-solaire);
    }

    .date-card.today .day,
    .date-card.today .month { color: #fff; }

    .date-card.active {
      background-color: var(--blanc-casse);
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      transform: scale(1.12);
    }

    .date-card.active .day,
    .date-card.active .month {
      color: var(--orange-brule);
      font-weight: 800;
    }

    .date-card.faded { opacity: 0.45; }

    /* ── CATEGORIES ── */
    .categories {
      width: 100%;
      background-color: #fff;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      box-shadow: 0 2px 10px rgba(163,59,38,0.1);
      animation: slideDown 0.25s ease;
    }

    .categories::-webkit-scrollbar { display: none; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 20px;
      background-color: #f5e8e5;
      color: var(--orange-brule);
      font-family: 'Inter', sans-serif;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      border: 2px solid transparent;
      transition: all 0.18s;
    }

    .cat-chip:hover { background-color: #f0d8d3; }

    .cat-chip.selected {
      background-color: var(--orange-brule);
      color: var(--blanc-casse);
      border-color: var(--orange-brule);
    }

    .cat-chip .icon { font-size: 1rem; }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .main h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--orange-brule);
      letter-spacing: 0.04em;
    }

    .main h1 span { color: var(--orange-corail); }

    .main p {
      font-size: 0.95rem;
      color: #999;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <div class="app-title">Le <span>Spot</span> Angers</div>
      <div class="header-badge">Angers 🌅</div>
    </div>
    <div class="date-list" id="dateList"></div>
  </div>

  <div class="categories" id="categories">
    <div class="cat-chip selected" data-cat="bar"><span class="icon">🍺</span> Bar</div>
    <div class="cat-chip" data-cat="bde"><span class="icon">🎓</span> BDE</div>
    <div class="cat-chip" data-cat="culture"><span class="icon">🎨</span> Culture</div>
    <div class="cat-chip" data-cat="evenements"><span class="icon">🎉</span> Évènements</div>
  </div>

  <div class="main">
    <h1>Le <span>Spot</span><br>Angers</h1>
    <p>La nouvelle app angevine 🌇</p>
  </div>

  <script>
    const months = ['jan','fév','mars','avr','mai','juin','juil','août','sep','oct','nov','déc'];
    const list = document.getElementById('dateList');
    const today = new Date();

    for (let i = -3; i <= 3; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);

      const card = document.createElement('div');
      let cls = 'date-card';
      if (i === 0) cls += ' today active';
      if (i < -1) cls += ' faded';
      card.className = cls;

      card.innerHTML = `
        <span class="day">${String(d.getDate()).padStart(2,'0')}</span>
        <span class="month">${months[d.getMonth()]}</span>
      `;

      card.addEventListener('click', () => {
        document.querySelectorAll('.date-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });

      list.appendChild(card);
    }

    document.querySelectorAll('.cat-chip').forEach(chip => {
      chip.addEventListener('click', () => chip.classList.toggle('selected'));
    });
  </script>

</body>
</html>
